name: Deployer EC2

on:
  workflow_run:
    workflows: ["CI/CD - Outsera API"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deployer-ec2:
    name: Deployer EC2
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deployer EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            kubectl set image deployment/outsera-api outsera-api=ghcr.io/edilson-lessadev/outsera-api:${{ github.event.workflow_run.head_sha }}
            kubectl rollout status deployment/outsera-api
            kubectl wait --for=condition=available deployment/outsera-api --timeout=180s
            kubectl get pods
          EOF