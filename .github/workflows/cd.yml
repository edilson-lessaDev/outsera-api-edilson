name: CD - Outsera API

on:
  workflow_run:
    workflows: ["CI/CD - Outsera API"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy na EC2 e validar health
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            kubectl set image deployment/outsera-api outsera-api=ghcr.io/edilson-lessadev/outsera-api:${{ github.event.workflow_run.head_sha }}
            kubectl rollout status deployment/outsera-api
            kubectl get pods
            kubectl port-forward deployment/outsera-api 18081:8081 >/tmp/outsera-port-forward.log 2>&1 &
            sleep 10
            curl -f http://127.0.0.1:18081/actuator/health
          EOF