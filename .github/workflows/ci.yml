name: CI - Outsera API

on:
  push:
    branches:
      - outseraDesafio
  pull_request:
    branches:
      - outseraDesafio

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build e testes
        run: mvn clean verify