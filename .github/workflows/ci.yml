name: CI/CD - Outsera API

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/edilson-lessadev/outsera-api

on:
  push:
    branches:
      - outseraDesafio
  pull_request:
    branches:
      - outseraDesafio

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build e testes
        run: mvn clean verify

      - name: Publicar artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: outsera-api-${{ github.ref_name }}-run-${{ github.run_number }}
          path: target/*.jar

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/edilson-lessadev/outsera-api:latest
            ghcr.io/edilson-lessadev/outsera-api:${{ github.sha }}